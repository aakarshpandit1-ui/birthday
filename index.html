<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cake Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
   <body>

    <div class="container">
        <div class="balloon balloon1"></div>
        <div class="balloon balloon2"></div>

        <div class="cake">
            <div class="candle"></div>
            <div class="top-layer"></div>
            <div class="middle-layer"></div>
            <div class="bottom-layer"></div>
        </div>

        <div class="balloon balloon3"></div>
        <div class="balloon balloon4"></div>
    </div>
    <!-- Outside the box -->
    <div class="birthday-text">Happiest Birthday to you KSI urf <br> <center> Prashasti Malaviya!</center></div>
     <div class="popup" id="popup">
    <div class="popup-box">
        🎉 Surprise! 🎉
        <br>
        Happy Birthday!
    </div>
</div>
     <div class="confetti-container" id="confetti-container"></div>

</body>
    <script>
function createConfetti() {
    const container = document.getElementById("confetti-container");
    const colors = ["red", "yellow", "blue", "green", "pink", "orange"];

    for(let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];

        confetti.style.left = "50%";
        confetti.style.top = "50%";

        confetti.style.setProperty(
            "--x",
            `${Math.random() * 800 - 400}px`
        );

        confetti.style.setProperty(
            "--y",
            `${Math.random() * 800 - 400}px`
        );

        container.appendChild(confetti);

        setTimeout(() => {
            confetti.remove();
        }, 2000);
    }
}

window.onload = createConfetti;
</script>
  </body>
</html>
